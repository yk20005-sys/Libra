{% extends 'base.html' %}
{% block content %}
<div class="container py-4">
    <h2 class="mb-4">Чатик</h2>
    <div class="chat-box bg-dark p-3 rounded-4 mb-3" style="height: 400px; overflow-y: auto; border: 1px solid #333;">
        {% for msg in messages %}
            <div class="mb-2">
                <span class="text-info fw-bold">{{ msg.user }}:</span>
                <span class="text-white">{{ msg.text }}</span>
                <small class="text-muted ms-2" style="font-size: 10px;">{{ msg.time }}</small>
            </div>
        {% endfor %}
    </div>
    <form method="POST" class="d-flex gap-2">
        <input type="text" name="message" class="form-control bg-secondary text-white border-0" placeholder="Напиши что-нибудь..." required>
        <button type="submit" class="btn btn-primary">Отправить</button>
    </form>
</div>
{% endblock %}
