{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card p-4 shadow-lg">
            <h3 class="text-center mb-4 fw-bold"><span class="file-pink">Вход в  MusFile </span> </h3>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Имя пользователя</label>
                    <input type="text" class="form-control" name="username" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Пароль</label>
                    <input type="password" class="form-control" name="password" required>
                </div>
                <button type="submit" class="btn btn-musfile w-100 mt-2 py-2">Войти</button>
            </form>
            <div class="text-center mt-4 small text-secondary">
                Нет аккаунта? <a href="/register" class="text-info-mus">Зарегистрироваться</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
