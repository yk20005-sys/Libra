<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MusFile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root { --mus-pink: #FFB6C1; }

        body {
            background-color: #0f0f0f !important;
            color: #fff !important;
            display: flex;
            min-height: 100vh;
            margin: 0;
        }

        .card {
            background-color: #161616 !important;
            border: 1px solid #333 !important;
            border-radius: 20px !important;
        }
        .form-label {
            color: var(--mus-pink) !important;
            font-weight: 500;
        }
        .form-control, .form-select {
            background-color: #222 !important;
            border: 1px solid #444 !important;
            color: #fff !important;
            border-radius: 10px !important;
        }
        .form-control:focus {
            border-color: var(--mus-pink) !important;
            box-shadow: 0 0 0 0.25rem rgba(255, 182, 193, 0.2) !important;
        }


        .btn-musfile {
            background-color: var(--mus-pink) !important;
            color: #000 !important;
            border: none !important;
            font-weight: bold !important;
            border-radius: 12px !important;
            padding: 10px 20px;
            transition: 0.3s;
        }
        .btn-musfile:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }


        .sidebar {
            width: 260px;
            background-color: #000;
            border-right: 1px solid #222;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            padding: 20px;
            z-index: 1000;
        }
        .sidebar a {
            color: #aaa;
            text-decoration: none;
            padding: 12px 15px;
            border-radius: 12px;
            margin-bottom: 5px;
            font-weight: 600;
            transition: 0.2s;
            display: flex;
            align-items: center;
        }
        .sidebar a:hover, .sidebar a.active { background-color: #1a1a1a; color: var(--mus-pink); }
        .sidebar a i { margin-right: 12px; font-size: 1.2rem; width: 25px; text-align: center; }

        .content { margin-left: 260px; flex-grow: 1; padding: 40px; }
        .file-pink { color: var(--mus-pink); }


        .text-info-mus { color: var(--mus-pink) !important; text-decoration: none; }
        .text-info-mus:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2 class="fw-bold mb-4 px-2">Mus<span class="file-pink">File</span></h2>
        <a href="/"><i class="bi bi-house-door"></i> Главная</a>
        <a href="/favorites"><i class="bi bi-heart"></i> Избранное</a>
        <a href="/chat"><i class="bi bi-chat-dots"></i> Чат</a>
        <a href="/add"><i class="bi bi-plus-circle"></i> Добавить трек</a>

        <div class="mt-auto px-1">
            <hr style="border-color: #333;">
            {% if current_user.is_authenticated %}
                <div class="px-3 mb-3 small text-secondary">Юзер: <b class="text-white">{{ current_user.username }}</b></div>
                <a href="/logout" class="text-danger"><i class="bi bi-box-arrow-left"></i> Выйти</a>
            {% else %}
                <a href="/login"><i class="bi bi-box-arrow-in-right"></i> Вход</a>
                <a href="/register"><i class="bi bi-person-plus"></i> Регистрация</a>
            {% endif %}
        </div>
    </div>

    <div class="content">
        {% block content %}{% endblock %}
    </div>

</body>
</html>
