{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-7 col-lg-6">
        <div class="card p-4 shadow-lg">
            <h3 class="text-center mb-4 fw-bold"><span class="file-pink"> Добавить новый трек </span></h3>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Название трека</label>
                    <input type="text" class="form-control" name="title" placeholder="Напр: Танцуй" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Исполнитель</label>
                    <input type="text" class="form-control" name="artist" placeholder="Напр: Кино" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Ссылка на трек</label>
                    <input type="url" class="form-control" name="link" placeholder="https://..." required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Выбери вайб</label>
                    <select class="form-select" name="mood">
                        {% for mood_option in available_moods %}
                            <option value="{{ mood_option }}">{{ mood_option }}</option>
                        {% endfor %}
                    </select>
                </div>
                <button type="submit" class="btn btn-musfile w-100 mt-3 py-3">Сохранить трек</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
